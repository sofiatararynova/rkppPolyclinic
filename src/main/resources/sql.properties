patient.find_by_id = SELECT id, last_name, first_name, middle_name, date_of_birth, residential_address FROM myschema.patient WHERE id = ?
patient.find_all = SELECT id, last_name, first_name, middle_name, date_of_birth, residential_address FROM myschema.patient
patient.save = INSERT INTO myschema.patient (last_name, first_name, middle_name, date_of_birth, residential_address) VALUES (?, ?, ?, ?, ?)
patient.update = UPDATE myschema.patient SET last_name = ?, first_name = ?, middle_name = ?, date_of_birth = ?, residential_address = ? WHERE id = ?
patient.delete = DELETE FROM myschema.patient WHERE id = ?